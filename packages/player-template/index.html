<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <title>RPG Maker VXAce Web</title>
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: #000;
      }

      .boot-status {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: #000;
        color: #f6f3e8;
        font:
          14px/1.5 system-ui,
          sans-serif;
      }

      .boot-status__inner {
        display: grid;
        gap: 10px;
        justify-items: center;
      }

      .boot-status__title {
        font-size: 18px;
        font-weight: 700;
      }

      .boot-status__message {
        color: rgba(246, 243, 232, 0.72);
      }

      .boot-status__message--error {
        max-width: min(720px, calc(100vw - 32px));
        color: #ffb4aa;
        white-space: pre-wrap;
      }
    </style>
    <!-- USER-SCRIPT -->
  </head>
  <body>
    <div id="app">
      <div class="boot-status" role="status" aria-live="polite">
        <div class="boot-status__inner">
          <div class="boot-status__title">RPG Maker VXAce Web</div>
          <div class="boot-status__message">Loading runtime...</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/runtime/main.ts"></script>
  </body>
</html>
