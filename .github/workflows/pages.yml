name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node

      - name: Build converter web
        run: pnpm turbo run build --filter rpgmaker-vxace-web-site
        env:
          VITE_BASE_PATH: /vxace-web/

      - name: Build playground
        run: pnpm turbo run build --filter rpgmaker-vxace-web-playground
        env:
          VITE_BASE_PATH: /vxace-web/playground/

      - name: Prepare Pages artifact
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p pages
          cp -R apps/site/dist/. pages/
          mkdir -p pages/playground
          cp -R apps/playground/dist/. pages/playground/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 #v5.0.0
        with:
          path: pages

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
